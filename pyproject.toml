[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | chroma_db
  | pdfs
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.ruff]
line-length = 88
target-version = "py311"

# Enable Pyflakes (F), Pycodestyle (E, W), and Isort (I)
select = ["E", "F", "I", "W"]
ignore = []

# Exclude common directories
exclude = [
    ".git",
    ".github",
    "chroma_db",
    "pdfs",
    "logs",
    "__pycache__",
    "build",
    "dist"
]

[tool.ruff.mccabe]
max-complexity = 10
